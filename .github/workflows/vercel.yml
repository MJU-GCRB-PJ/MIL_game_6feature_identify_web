name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: secrets
    env:
      DATA_ENV: ${{ secrets.DATA_ENV }}
      AUTH_ENV: ${{ secrets.AUTH_ENV }}
      AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy
        run: >
          npx vercel@56.2.0 deploy --yes --prod
          --token="${{ secrets.WEB_TOKEN }}"
          --project mil-game-6feature-identify-web
          --build-env DATA_ENV="$DATA_ENV"
          --build-env AUTH_ENV="$AUTH_ENV"
          --build-env AUTH_SESSION_SECRET="$AUTH_SESSION_SECRET"
          --env DATA_ENV="$DATA_ENV"
          --env AUTH_ENV="$AUTH_ENV"
          --env AUTH_SESSION_SECRET="$AUTH_SESSION_SECRET"
