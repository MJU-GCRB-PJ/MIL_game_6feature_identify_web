name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      data_env: ${{ secrets.data_env }}
      auth_env: ${{ secrets.auth_env }}
      AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Pull Vercel project settings
        run: npx vercel@56.2.0 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        run: npx vercel@56.2.0 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy
        run: >
          npx vercel@56.2.0 deploy --prebuilt --prod
          --token="${{ secrets.VERCEL_TOKEN }}"
          --env data_env="$data_env"
          --env auth_env="$auth_env"
          --env AUTH_SESSION_SECRET="$AUTH_SESSION_SECRET"
